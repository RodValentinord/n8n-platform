# deploy.yaml — CI/CD pipeline for n8n platform
# Triggers: push to main branch (or manual dispatch)

name: Deploy n8n Platform

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "argo-rollouts/**"
      - "observability/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"

env:
  HELM_VERSION: "3.14.0"
  KUBECTL_VERSION: "1.29.3"
  NAMESPACE: "n8n"

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: helm lint ./charts/n8n -f ./charts/values/values-challenge.yaml

  deploy:
    name: Deploy via Helm
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v${{ env.KUBECTL_VERSION }}

      # TODO: Choose auth method — kubeconfig via secret or SSH tunnel
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade (n8n)
        run: |
          helm upgrade n8n ./charts/n8n \
            --install \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f charts/values/values-challenge.yaml \
            --set global.imageTag=${{ github.sha }} \
            --wait \
            --timeout 5m

      - name: Trigger Argo Rollouts canary
        run: |
          # TODO: Install argo rollouts kubectl plugin in runner or use API
          kubectl argo rollouts set image n8n-main \
            n8n=n8nio/n8n:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}

      - name: Watch rollout status
        run: |
          kubectl argo rollouts status n8n-main -n ${{ env.NAMESPACE }} --timeout 10m
