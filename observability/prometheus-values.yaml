# Custom values for kube-prometheus-stack
# helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#   -n monitoring --create-namespace -f observability/prometheus-values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # Scrape n8n pods via annotations
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  # Definir na instalação: --set grafana.adminPassword='<senha>' (ver credenciais-oci.txt)
  adminPassword: "CHANGE_ME"
  persistence:
    enabled: true
    size: 5Gi
  # initChownData causa "Permission denied" no PV local-path do K3s ao fazer upgrade
  # O dado já existe no PVC com as permissões corretas do deploy anterior
  initChownData:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.rvalentino.com
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.rvalentino.com
  grafana.ini:
    server:
      root_url: "https://grafana.rvalentino.com"
      serve_from_sub_path: false
  # Diretório custom precisa existir; senão Grafana enche o log de "no such file or directory"
  # emptyDir garante que o diretório existe mesmo sem dashboards montados via ConfigMap
  extraVolumes:
    - name: dashboards-custom
      emptyDir: {}
  extraVolumeMounts:
    - name: dashboards-custom
      mountPath: /var/lib/grafana/dashboards/custom
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: custom
          folder: "n8n Platform"
          type: file
          options:
            path: /var/lib/grafana/dashboards/custom
  # TODO: Mount grafana-dashboards/ JSONs via ConfigMap
  # Loki datasource: gerenciado aqui porque o sub-chart Grafana do loki-stack está desabilitado
  # (grafana.enabled: false em loki-values.yaml evita conflito de isDefault com o Prometheus)
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
        # Desabilita o log-volume histogram do Grafana 12 (usa `| drop __error__`
        # que não existe no Loki 2.6.1). Queries LogQL normais não são afetadas.
        disableGrafanaMetaQuery: true

# Alertmanager: alertas ficam no próprio Alertmanager (UI). Depois podemos adicionar email ou Telegram.
alertmanager:
  config:
    route:
      receiver: default
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        # Sem integração externa por enquanto; depois: email ou Telegram

# Custom alert rules
additionalPrometheusRulesMap:
  n8n-rules:
    groups:
      - name: n8n
        rules:
          - alert: N8nHighErrorRate
            expr: rate(n8n_workflow_executions_total{status="error"}[5m]) / rate(n8n_workflow_executions_total[5m]) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "n8n error rate > 5% for 2 minutes"
          - alert: N8nWorkerQueueDepth
            expr: n8n_bull_queue_waiting > 50
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "n8n worker queue depth > 50 jobs"
