# AnalysisTemplate — used by the n8n main Rollout to gate canary progression.
# Queries Prometheus to validate error rate and latency before promoting.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: n8n-canary-analysis
  namespace: n8n
spec:
  metrics:
    - name: error-rate
      interval: 60s
      count: 5           # 5 medições consecutivas bem-sucedidas para promover
      failureLimit: 1
      provider:
        prometheus:
          address: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
          query: sum(rate(n8n_workflow_executions_total{status="error"}[2m])) / sum(rate(n8n_workflow_executions_total[2m]))
      # len(result)==0 cobre o caso de não haver execuções (divisão retorna NaN/sem dados)
      successCondition: len(result) == 0 || result[0] < 0.05

    - name: p99-event-loop-lag
      interval: 60s
      count: 5
      failureLimit: 1
      provider:
        prometheus:
          address: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
          # n8n não expõe http_request_duration_seconds — usa event loop lag p99 como proxy de latência
          query: max(n8n_nodejs_eventloop_lag_p99_seconds)
      successCondition: len(result) == 0 || result[0] < 0.5    # p99 < 500 ms

---
