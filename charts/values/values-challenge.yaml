# values-challenge.yaml — overrides para o cluster Oracle Cloud Always Free (24 GB RAM)
# Uso: helm upgrade --install n8n ./charts/n8n \
#        -n n8n --create-namespace \
#        -f charts/values/values-challenge.yaml

# Secret com credenciais criado manualmente no cluster (não gerenciado pelo Helm).
# Impede que helm upgrade sobrescreva os valores com strings vazias.
existingSecret: "n8n-secrets"

global:
  environment: prod
  image:
    tag: "2.9.3"
  host: n8n.rvalentino.com
  protocol: https

namespace: n8n

config:
  database:
    # Service name do release: helm install n8n-postgresql bitnami/postgresql
    host: "n8n-postgresql"
    name: "n8n"
  redis:
    # Service name do release: helm install n8n-redis bitnami/redis
    host: "n8n-redis-master"

# ── n8n Main ──────────────────────────────────────────────────────────────────
main:
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ── n8n Webhook ───────────────────────────────────────────────────────────────
webhook:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: "150m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ── n8n Worker ────────────────────────────────────────────────────────────────
worker:
  replicas: 2
  concurrency: 5
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1500m"
      memory: "1536Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPodsPerPeriod: 1
      periodSeconds: 120

# ── Ingress (Nginx + cert-manager + Cloudflare) ───────────────────────────────
ingress:
  enabled: true
  className: nginx
  tls:
    secretName: n8n-tls
  # Após cluster estabilizar, substituir por IPs oficiais da Cloudflare:
  # https://www.cloudflare.com/ips-v4
  whitelistSourceRange: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

# ── Scheduling — restringir aos agent nodes (control plane não roda workloads) ─
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

# ── Backup ────────────────────────────────────────────────────────────────────
# Habilitar após provisionar o bucket OCI e criar a PAR URL.
# Ver: MEMORIA/memoria.md > Pendências
backup:
  enabled: false
  # parUrl é credencial de escrita — injetar via --set backup.parUrl=<url> ou sealed-secrets.
  parUrl: ""
