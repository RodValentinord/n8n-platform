apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "n8n.fullname" . }}-worker
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    {{- include "n8n.selectorLabels" (dict "context" . "role" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" (dict "context" . "role" "worker") | nindent 6 }}
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 50
        - pause: { duration: 1m }
        - setWeight: 100
  template:
    metadata:
      labels:
        {{- include "n8n.labels" . | nindent 8 }}
        {{- include "n8n.selectorLabels" (dict "context" . "role" "worker") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- include "n8n.podAnnotations" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: n8n
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["n8n", "worker", "--concurrency={{ .Values.worker.concurrency }}"]
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: QUEUE_HEALTH_CHECK_ACTIVE
              value: "true"
          envFrom:
            - configMapRef:
                name: {{ include "n8n.configMapName" . }}
            - secretRef:
                name: {{ include "n8n.secretName" . }}
          readinessProbe:
            httpGet:
              path: /healthz/readiness
              port: http
            initialDelaySeconds: {{ .Values.worker.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.worker.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
