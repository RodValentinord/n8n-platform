{{- if .Values.main.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "n8n.fullname" . }}-main
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.main.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" (dict "context" . "role" "main") | nindent 6 }}
{{- end }}
{{- if and .Values.webhook.enabled .Values.webhook.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "n8n.fullname" . }}-webhook
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.webhook.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" (dict "context" . "role" "webhook") | nindent 6 }}
{{- end }}
