apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "n8n.fullname" . }}-main
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    {{- include "n8n.selectorLabels" (dict "context" . "role" "main") | nindent 4 }}
spec:
  replicas: {{ .Values.main.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" (dict "context" . "role" "main") | nindent 6 }}
  strategy:
    canary:
      canaryService: {{ include "n8n.fullname" . }}-main-canary
      stableService: {{ include "n8n.fullname" . }}-main
      trafficRouting:
        nginx:
          stableIngress: {{ include "n8n.fullname" . }}-ingress
      steps:
        - setWeight: 20
        - analysis:
            templates:
              - templateName: n8n-canary-analysis
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100
  template:
    metadata:
      labels:
        {{- include "n8n.labels" . | nindent 8 }}
        {{- include "n8n.selectorLabels" (dict "context" . "role" "main") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- include "n8n.podAnnotations" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.main.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: n8n
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["n8n", "start"]
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: N8N_DISABLE_PRODUCTION_MAIN_PROCESS
              value: "true"
          envFrom:
            - configMapRef:
                name: {{ include "n8n.configMapName" . }}
            - secretRef:
                name: {{ include "n8n.secretName" . }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.main.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.main.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.main.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.main.probes.liveness.periodSeconds }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.main.resources | nindent 12 }}
