{{- if .Values.webhook.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "n8n.fullname" . }}-webhook
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    {{- include "n8n.selectorLabels" (dict "context" . "role" "webhook") | nindent 4 }}
  {{- with .Values.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "n8n.selectorLabels" (dict "context" . "role" "webhook") | nindent 4 }}
  ports:
    - port: 80
      targetPort: 5678
      protocol: TCP
{{- end }}
